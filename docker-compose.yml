services:
  tuyabot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuyabot
    restart: unless-stopped

    # Mount environment & persistent data dari host
    volumes:
      - ./.env:/app/.env:ro          # read-only env
      - ./users_db.json:/app/users_db.json  # persist runtime users
      - ./logs:/app/logs             # persist logs

    # tinytuya needs host network to reach local Tuya devices
    # (remove if using Tuya Cloud API only)
    network_mode: host

    # Dashboard API (host network → langsung di port host, bukan port mapping)
    # Akses: http://<IP-server>:8080

    # Graceful shutdown
    stop_signal: SIGTERM
    stop_grace_period: 10s
